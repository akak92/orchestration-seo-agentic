# Alembic configuration file
# Documentación: https://alembic.sqlalchemy.org/

[alembic]
# Ruta al directorio de migraciones (relativa a este archivo)
script_location = alembic

# URL de la base de datos — sobreescrita por env_url en env.py
# No usar asyncpg aquí: Alembic corre de forma síncrona en CLI
# En env.py se usa asyncio runner para soporte async
sqlalchemy.url = postgresql://newsroom:changeme@localhost:5432/newsroom_db

[post_write_hooks]
# Sin hooks post-escritura

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
