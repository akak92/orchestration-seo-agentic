services:

  # ── Infraestructura ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: newsroom_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-newsroom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-newsroom_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsroom} -d ${POSTGRES_DB:-newsroom_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newsroom_net

  redis:
    image: redis:7-alpine
    container_name: newsroom_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newsroom_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: newsroom_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - newsroom_net

  # ── Servicios de aplicación ──────────────────────────────────────────────────

  api:
    build:
      context: ./Service/api
      dockerfile: Dockerfile
    container_name: newsroom_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - newsroom_net
    restart: unless-stopped

  agent:
    build:
      context: ./Service/agent
      dockerfile: Dockerfile
    container_name: newsroom_agent
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - newsroom_net
    restart: unless-stopped

  worker:
    build:
      context: ./Service/worker
      dockerfile: Dockerfile
    container_name: newsroom_worker
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - newsroom_net
    restart: unless-stopped

# ── Volúmenes persistentes ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

# ── Red interna ────────────────────────────────────────────────────────────────
networks:
  newsroom_net:
    driver: bridge
